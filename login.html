<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geruso Detailing - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    .login-page-main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
    }

    .login-box {
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-section h1 {
      font-size: 28px;
      color: #ffffff;
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-section p {
      color: #888;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 32px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .tab-btn {
      flex: 1;
      padding: 14px 0;
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
      font-size: 13px;
      letter-spacing: 0.5px;
      position: relative;
    }

    .tab-btn.active {
      color: #00FF41;
      border-bottom-color: #00FF41;
    }

    .tab-btn:hover {
      color: #aaa;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: rgba(0, 255, 65, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(0, 255, 65, 0.1);
    }

    .form-group input::placeholder {
      color: #555;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ff6b6b;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #51cf66;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #00FF41 0%, #00DD33 100%);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(0, 255, 65, 0.2);
      letter-spacing: 0.3px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 255, 65, 0.3);
    }

    .submit-btn:disabled {
      background: #444;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .divider {
      text-align: center;
      margin: 28px 0;
      color: #555;
      font-size: 12px;
      font-weight: 500;
    }

    .divider::before,
    .divider::after {
      content: '';
      display: inline-block;
      width: 35%;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      vertical-align: middle;
    }

    .divider::before {
      margin-right: 10px;
    }

    .divider::after {
      margin-left: 10px;
    }

    /* Empty mount the Google GSI library renders its own branded
       button into. No dark wrapper / extra styling — just center it. */
    .oauth-mount {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 44px;
    }
    .oauth-mount > div { max-width: 100%; }

    .demo-section {
      background: rgba(0, 255, 65, 0.05);
      border: 1px solid rgba(0, 255, 65, 0.15);
      border-radius: 8px;
      padding: 16px;
      margin-top: 24px;
      font-size: 12px;
      color: #777;
    }

    .demo-section h4 {
      color: #00FF41;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .demo-credentials {
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 10px;
      border-radius: 6px;
      margin: 6px 0;
      color: #00FF41;
      font-size: 11px;
      border: 1px solid rgba(0, 255, 65, 0.1);
    }

    .loading {
      display: none;
      text-align: center;
      color: #666;
      font-size: 13px;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .login-box {
        padding: 24px;
      }

      .logo-section h1 {
        font-size: 24px;
      }

      .tabs {
        font-size: 12px;
      }

      .tab-btn {
        padding: 8px;
      }
    }
  </style>
  <link rel="stylesheet" href="/css/customer.css">
  <!-- Google Sign-In Library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body data-page="login">
  <!-- Shared customer nav so users can navigate away from /login -->
  <div data-nav></div>

  <main class="login-page-main">
  <div class="login-container">
    <div class="login-box">
      <div class="logo-section">
        <h1>Geruso Detailing</h1>
        <p>Professional Auto Care & Detailing</p>
      </div>

      <div id="loginError" class="error-message"></div>

      <div class="divider">SIGN IN WITH GOOGLE</div>

      <!-- Google renders its own branded button into this empty mount -->
      <div class="oauth-mount" id="googleLoginBtn"></div>
    </div>
  </div>
  </main>

  <script src="/js/customer-shell.js"></script>
  <script>
    // Google OAuth Handler
    window.handleGoogleSignIn = async (response) => {
      try {
        const errorDiv = document.getElementById('loginError');
        if (errorDiv) errorDiv.classList.remove('show');
        // Send the ID token to backend for authentication
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken: response.credential })
        });

        const data = await res.json();

        if (!res.ok) {
          const msg = 'Login failed: ' + (data.error || 'Unknown error');
          if (errorDiv) {
            errorDiv.textContent = msg;
            errorDiv.classList.add('show');
          } else {
            alert(msg);
          }
          return;
        }

        // Store token and user info
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Customers go to the regular home page; staff go to the app shell
        // (which loads the owner/admin dashboard in an iframe)
        if (data.user && (data.user.role === 'owner' || data.user.role === 'dev')) {
          window.location.href = '/app';
        } else {
          window.location.href = '/';
        }
      } catch (error) {
        console.error('Google sign-in error:', error);
        alert('Sign-in failed: ' + error.message);
      }
    };

    // Initialize Google Sign-In.
    let googleInited = false;
    function renderGoogleButton(mountId) {
      const el = document.getElementById(mountId);
      if (!el || !window.google || !window.google.accounts) return;
      el.innerHTML = ''; // wipe any prior render before re-mounting
      google.accounts.id.renderButton(el, {
        theme: 'filled_black', size: 'large',
        text: 'continue_with', shape: 'rectangular', width: 360
      });
    }
    function initGoogle() {
      if (googleInited || !(window.google && window.google.accounts)) return;
      google.accounts.id.initialize({
        client_id: '538501956164-0je68bac6jsc97q1ravlv78rf6473fe7.apps.googleusercontent.com',
        callback: window.handleGoogleSignIn
      });
      googleInited = true;
      renderGoogleButton('googleLoginBtn');
    }
    window.addEventListener('load', initGoogle);

    // Note: previously auto-redirected logged-in users away from /login,
    // which made the page flash and close immediately. Now the login page
    // is always visible — user can sign in as someone else or sign out.
  </script>
</body>
</html>
