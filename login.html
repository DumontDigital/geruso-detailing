<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geruso Detailing - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .login-box {
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-section h1 {
      font-size: 28px;
      color: #ffffff;
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-section p {
      color: #888;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 32px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .tab-btn {
      flex: 1;
      padding: 14px 0;
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
      font-size: 13px;
      letter-spacing: 0.5px;
      position: relative;
    }

    .tab-btn.active {
      color: #00FF41;
      border-bottom-color: #00FF41;
    }

    .tab-btn:hover {
      color: #aaa;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: rgba(0, 255, 65, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(0, 255, 65, 0.1);
    }

    .form-group input::placeholder {
      color: #555;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ff6b6b;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #51cf66;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #00FF41 0%, #00DD33 100%);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(0, 255, 65, 0.2);
      letter-spacing: 0.3px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 255, 65, 0.3);
    }

    .submit-btn:disabled {
      background: #444;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .divider {
      text-align: center;
      margin: 28px 0;
      color: #555;
      font-size: 12px;
      font-weight: 500;
    }

    .divider::before,
    .divider::after {
      content: '';
      display: inline-block;
      width: 35%;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      vertical-align: middle;
    }

    .divider::before {
      margin-right: 10px;
    }

    .divider::after {
      margin-left: 10px;
    }

    .oauth-btn {
      width: 100%;
      padding: 13px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .oauth-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(0, 255, 65, 0.4);
      box-shadow: 0 4px 12px rgba(0, 255, 65, 0.1);
    }

    .oauth-icon {
      width: 18px;
      height: 18px;
    }

    .demo-section {
      background: rgba(0, 255, 65, 0.05);
      border: 1px solid rgba(0, 255, 65, 0.15);
      border-radius: 8px;
      padding: 16px;
      margin-top: 24px;
      font-size: 12px;
      color: #777;
    }

    .demo-section h4 {
      color: #00FF41;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .demo-credentials {
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 10px;
      border-radius: 6px;
      margin: 6px 0;
      color: #00FF41;
      font-size: 11px;
      border: 1px solid rgba(0, 255, 65, 0.1);
    }

    .loading {
      display: none;
      text-align: center;
      color: #666;
      font-size: 13px;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .login-box {
        padding: 24px;
      }

      .logo-section h1 {
        font-size: 24px;
      }

      .tabs {
        font-size: 12px;
      }

      .tab-btn {
        padding: 8px;
      }
    }
  </style>
  <!-- Google Sign-In Library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo-section">
        <h1>Geruso Detailing</h1>
        <p>Professional Auto Care & Detailing</p>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Sign In</button>
        <button class="tab-btn" data-tab="register">Create Account</button>
      </div>

      <!-- LOGIN TAB -->
      <div id="login-tab" class="tab-content active">
        <div id="loginError" class="error-message"></div>

        <form id="loginForm">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="name@example.com" required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
          </div>

          <button type="submit" class="submit-btn" id="loginSubmitBtn">Sign In</button>
          <div class="loading" id="loginLoading">Signing in...</div>
        </form>

        <div class="divider">OR</div>

        <button class="oauth-btn" id="googleLoginBtn">
          <svg class="oauth-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>

        <div class="demo-section">
          <h4>Demo Accounts (Password: Test1234!)</h4>
          <div class="demo-credentials">owner@geruso-detailing.com</div>
          <div class="demo-credentials">dev@geruso-detailing.com</div>
          <div class="demo-credentials">customer@example.com</div>
        </div>
      </div>

      <!-- REGISTER TAB -->
      <div id="register-tab" class="tab-content">
        <div id="registerError" class="error-message"></div>
        <div id="registerSuccess" class="success-message"></div>

        <form id="registerForm">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="registerFirstName" placeholder="John" required>
          </div>

          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="registerLastName" placeholder="Doe" required>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="registerEmail" placeholder="name@example.com" required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="registerPassword" placeholder="••••••••" required minlength="8">
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="registerConfirm" placeholder="••••••••" required minlength="8">
          </div>

          <button type="submit" class="submit-btn" id="registerSubmitBtn">Create Account</button>
          <div class="loading" id="registerLoading">Creating account...</div>
        </form>

        <div class="divider">OR</div>

        <button type="button" class="oauth-btn" id="googleRegisterBtn">
          <svg class="oauth-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign up with Google
        </button>
      </div>
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const tab = e.target.dataset.tab;

        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        document.getElementById(tab + '-tab').classList.add('active');
        e.target.classList.add('active');

        // Clear errors
        document.getElementById('loginError').classList.remove('show');
        document.getElementById('registerError').classList.remove('show');
        document.getElementById('registerSuccess').classList.remove('show');
      });
    });

    // Login form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errorDiv = document.getElementById('loginError');
      const submitBtn = document.getElementById('loginSubmitBtn');
      const loading = document.getElementById('loginLoading');

      errorDiv.classList.remove('show');
      submitBtn.disabled = true;
      loading.style.display = 'block';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          // Redirect to app which will show appropriate view based on role
          window.location.href = '/';
        } else {
          errorDiv.textContent = data.error || 'Login failed';
          errorDiv.classList.add('show');
        }
      } catch (error) {
        errorDiv.textContent = 'Connection error: ' + error.message;
        errorDiv.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        loading.style.display = 'none';
      }
    });

    // Register form
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('registerFirstName').value;
      const lastName = document.getElementById('registerLastName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirm').value;

      const errorDiv = document.getElementById('registerError');
      const successDiv = document.getElementById('registerSuccess');
      const submitBtn = document.getElementById('registerSubmitBtn');
      const loading = document.getElementById('registerLoading');

      errorDiv.classList.remove('show');
      successDiv.classList.remove('show');

      if (password !== confirm) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.classList.add('show');
        return;
      }

      submitBtn.disabled = true;
      loading.style.display = 'block';

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, first_name: firstName, last_name: lastName })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          // Show success and redirect
          successDiv.textContent = 'Account created! Redirecting...';
          successDiv.classList.add('show');

          setTimeout(() => {
            window.location.href = '/booking.html';
          }, 2000);
        } else {
          errorDiv.textContent = data.error || 'Registration failed';
          errorDiv.classList.add('show');
        }
      } catch (error) {
        errorDiv.textContent = 'Connection error: ' + error.message;
        errorDiv.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        loading.style.display = 'none';
      }
    });

    // Google OAuth Handler
    window.handleGoogleSignIn = async (response) => {
      try {
        // Send the ID token to backend for authentication
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken: response.credential })
        });

        const data = await res.json();

        if (!res.ok) {
          alert('Login failed: ' + (data.error || 'Unknown error'));
          return;
        }

        // Store token and user info
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Redirect to authenticated dashboard
        window.location.href = '/app';
      } catch (error) {
        console.error('Google sign-in error:', error);
        alert('Sign-in failed: ' + error.message);
      }
    };

    // Initialize Google Sign-In
    window.addEventListener('load', function() {
      if (window.google && window.google.accounts) {
        google.accounts.id.initialize({
          client_id: '538501956164-0je68bac6jsc97q1ravlv78rf6473fe7.apps.googleusercontent.com',
          callback: window.handleGoogleSignIn
        });

        // Render sign-in button for login tab
        google.accounts.id.renderButton(
          document.getElementById('googleLoginBtn'),
          { theme: 'dark', size: 'large', width: '100%' }
        );

        // Render sign-in button for register tab
        google.accounts.id.renderButton(
          document.getElementById('googleRegisterBtn'),
          { theme: 'dark', size: 'large', width: '100%' }
        );
      }
    });

    // Check if already logged in
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token');
      if (token) {
        const user = JSON.parse(localStorage.getItem('user'));
        const role = user.role;

        if (role === 'owner') {
          window.location.href = '/owner-dashboard.html';
        } else if (role === 'dev') {
          window.location.href = '/dev-dashboard.html';
        } else {
          window.location.href = '/booking.html';
        }
      }
    });
  </script>
</body>
</html>
